#
# github action workflow for using semantic release when we push to the main branch
#

name: release
on:
    push:
        branches:
            - main
permissions: write-all
jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "lts/*"
                  cache: npm
            - run: npm ci
            - run: npx semantic-release
